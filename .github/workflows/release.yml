name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: gitaccount
            asset_name: gitaccount-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: gitaccount
            asset_name: gitaccount-linux-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: gitaccount
            asset_name: gitaccount-linux-musl-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact_name: gitaccount
            asset_name: gitaccount-linux-musl-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: gitaccount
            asset_name: gitaccount-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: gitaccount
            asset_name: gitaccount-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: gitaccount.exe
            asset_name: gitaccount-windows-x86_64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: gitaccount.exe
            asset_name: gitaccount-windows-arm64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux toolchains
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            sudo apt-get install -y musl-tools
          fi
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --verbose --release --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: strip "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  publish-release:
    name: Publish Release
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release

      - name: Create tar.gz archives for each platform
        run: |
          mkdir -p release-archives
          for dir in ./release/gitaccount-*; do
            if [ -d "$dir" ]; then
              asset_name=$(basename "$dir")
              tar -czf "release-archives/${asset_name}.tar.gz" -C "$dir" .
              ls -lh "release-archives/${asset_name}.tar.gz"
            fi
          done

      - name: Create Release with Assets
        uses: softprops/action-gh-release@v1
        with:
          files: release-archives/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crate:
    name: Publish to crates.io
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish --token ${{ secrets.CRATES_TOKEN }}
